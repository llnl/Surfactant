function softwareLabel(sw) {
  const n = sw.name?.find(x => x.nameType === 'product name')?.nameValue
         || sw.name?.[0]?.nameValue
         || sw.fileName?.[0]
         || '(unnamed)';
  return n;
}
function softwareSubLabel(sw) {
  const parts = [];
  if (sw.version) parts.push(`v${sw.version}`);
  if (sw.softwareType?.length) parts.push(sw.softwareType.join(', '));
  if (sw.fileName?.length && !parts.length) parts.push(sw.fileName[0]);
  if (sw.size) parts.push(`${sw.size} bytes`);
  return parts.join(' · ');
}

function SoftwareTab({ state, dispatch, emit, peerName }) {
  const list = state.currentSBOM?.software || [];
  const baseByUUID = useMemo(() => {
    const m = new Map();
    for (const sw of state.baseSBOM?.software || []) m.set(sw.UUID, sw);
    return m;
  }, [state.baseSBOM]);

  const filtered = useMemo(() => {
    const q = state.searchTerm.toLowerCase().trim();
    return list.filter(sw => {
      // Filter
      if (state.softwareFilter === 'modified') {
        const base = baseByUUID.get(sw.UUID);
        if (!base) return true; // added counts as modified
        if (deepEqual(sw, base)) return false;
      } else if (state.softwareFilter === 'added') {
        if (baseByUUID.has(sw.UUID)) return false;
      }
      if (!q) return true;
      const hay = JSON.stringify(sw).toLowerCase();
      return hay.includes(q);
    });
  }, [list, state.searchTerm, state.softwareFilter, baseByUUID]);

  const selected = list.find(s => s.UUID === state.selectedSoftwareUUID);
  const [showPurlBuilder, setShowPurlBuilder] = useState(false);

  // Keep the entry form uncluttered. The builder opens only on request and
  // closes when the user selects another software entry.
  useEffect(() => {
    setShowPurlBuilder(false);
  }, [state.selectedSoftwareUUID]);

  function addSoftware() {
    const sw = {
      UUID: genUUID(),
      softwareType: [],
      name: [{ nameType: 'product name', nameValue: 'New software entry' }],
      fileName: [],
      installPath: [],
      captureTime: isoNow(),
      version: '',
      vendor: [],
      description: '',
      notHashable: true,
      comments: [],
      metadata: [],
    };
    emit({ type: OP.SW_ADD, software: sw, anchor: null /* will be filled */ })
      .then(() => dispatch({type:'SELECT_SOFTWARE', uuid: sw.UUID}));
  }

  return (
    <div style={{display:'grid', gridTemplateColumns:'380px 1fr', height:'100%', overflow:'hidden'}}>
      <div className="divider-r" style={{display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <div style={{padding:'8px 10px', borderBottom:'1px solid var(--border)', display:'flex', gap:6}}>
          <div style={{position:'relative', flex:1}}>
            <div style={{position:'absolute', top:7, left:8, color:'var(--fg-3)'}}>
              <Icon name="search" size={12}/>
            </div>
            <input className="input" style={{paddingLeft:26}} placeholder="Search software…"
                   value={state.searchTerm}
                   onChange={e => dispatch({type:'SET_SEARCH', term:e.target.value})} />
          </div>
          <button className="btn btn-sm btn-primary" onClick={addSoftware} title="Add software entry">
            <Icon name="plus" size={11}/>
          </button>
        </div>
        <div style={{padding:'4px 10px', borderBottom:'1px solid var(--border)', fontSize:10,
                     display:'flex', gap:8, alignItems:'center'}}>
          <span style={{color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.06em'}}>Filter</span>
          {['all','modified','added'].map(f => (
            <button key={f} className={"btn btn-sm btn-ghost " + (state.softwareFilter===f ? '' : '')}
                    style={{
                      color: state.softwareFilter===f ? 'var(--accent)' : 'var(--fg-3)',
                      fontWeight: state.softwareFilter===f ? 600 : 400,
                    }}
                    onClick={() => dispatch({type:'SET_FILTER', filter:f})}>
              {f}
            </button>
          ))}
          <span style={{marginLeft:'auto', color:'var(--fg-3)', fontFamily:'var(--mono)'}}>
            {filtered.length}/{list.length}
          </span>
        </div>
        <div style={{flex:1, overflowY:'auto', position:'relative'}}>
          {filtered.map(sw => {
            const base = baseByUUID.get(sw.UUID);
            const isAdded = !base;
            const isModified = base && !deepEqual(sw, base);
            return (
              <div key={sw.UUID}
                   className={"list-row " + (state.selectedSoftwareUUID===sw.UUID ? 'selected' : '')}
                   style={{position:'relative'}}
                   onClick={() => dispatch({type:'SELECT_SOFTWARE', uuid: sw.UUID})}>
                <div style={{paddingTop:3}}>
                  {isAdded ? <span className="dot dot-added" title="Added"/>
                    : isModified ? <span className="dot dot-modified" title="Modified"/>
                    : <span className="dot" style={{background:'var(--border-2)'}}/>}
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:500, fontSize:12, overflow:'hidden',
                               textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                    {softwareLabel(sw)}
                  </div>
                  <div className="mono dim" style={{fontSize:10}}>{shortId(sw.UUID, 8)}</div>
                  <div className="muted" style={{fontSize:11, overflow:'hidden',
                                                 textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                    {softwareSubLabel(sw)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{overflowY:'auto'}}>
        {selected
          ? <SoftwareDetail key={selected.UUID} sw={selected} base={baseByUUID.get(selected.UUID)}
                            emit={emit} state={state} peerName={peerName}
                            showPurlBuilder={showPurlBuilder}
                            onTogglePurlBuilder={() => setShowPurlBuilder(value => !value)} />
          : <div style={{padding:40, color:'var(--fg-3)', textAlign:'center'}}>
              Select a software entry, or click + to add one.
            </div>}
      </div>
    </div>
  );
}

function RequirementBadge({ requirement='optional' }) {
  return <span className={requirementClass(requirement)}>{requirement}</span>;
}

function PurlComponentGuidance({ definition, component }) {
  const def = componentDefinition(definition, component);
  if (!def || !Object.keys(def).length) return null;
  const notes = [];
  if (def.native_name) notes.push(`Native name: ${def.native_name}`);
  if (def.case_sensitive === false) notes.push('Canonical value will be lowercased.');
  if (def.permitted_characters) notes.push(`Pattern: ${def.permitted_characters}`);
  if (def.note) notes.push(def.note);
  return notes.length ? <div className="purl-help">{notes.join(' · ')}</div> : null;
}

function PurlBuilderPanel({ sourceSw, emit }) {
  const [typeDefinitions, setTypeDefinitions] = useState(() => ({
    ...deepClone(BUILTIN_PURL_TYPE_DEFINITIONS),
    ...loadStoredPurlDefinitions(),
  }));
  const [pType, setPType] = useState('generic');
  const [pNamespace, setPNamespace] = useState('');
  const [pName, setPName] = useState('');
  const [pVersion, setPVersion] = useState('');
  const [pSubpath, setPSubpath] = useState('');
  const [qualifierValues, setQualifierValues] = useState({});
  const [extraQualifiers, setExtraQualifiers] = useState([]);
  const [relationship, setRelationship] = useState('Uses');
  const [built, setBuilt] = useState('');
  const [parseInput, setParseInput] = useState('');
  const [definitionMessages, setDefinitionMessages] = useState([]);

  const normalizedType = pType.trim().toLowerCase();
  const selectedDefinition = typeDefinitions[normalizedType] || null;
  const qualifierDefinitions = selectedDefinition?.qualifiers_definition || [];
  const typeOptions = useMemo(() => Object.values(typeDefinitions).sort((a,b) => a.type.localeCompare(b.type)), [typeDefinitions]);

  useEffect(() => {
    setBuilt('');
  }, [sourceSw?.UUID]);

  useEffect(() => {
    setQualifierValues(prev => {
      const next = {};
      for (const q of qualifierDefinitions) next[q.key] = prev[q.key] ?? '';
      return next;
    });
    if (componentRequirement(selectedDefinition, 'namespace', 'optional') === 'prohibited') setPNamespace('');
  }, [normalizedType, selectedDefinition]);

  function collectQualifiers() {
    const out = {};
    for (const qDef of qualifierDefinitions) {
      const raw = String(qualifierValues[qDef.key] ?? '').trim();
      const value = raw || (qDef.default_value !== undefined ? String(qDef.default_value) : '');
      if (value) out[qDef.key.toLowerCase()] = value;
    }
    for (const row of extraQualifiers) {
      const key = String(row.key || '').trim().toLowerCase();
      const value = String(row.value || '').trim();
      if (!key && !value) continue;
      if (!PURL_QUALIFIER_KEY_PATTERN.test(key)) throw new Error(`Invalid qualifier key: ${key || '(blank)'}`);
      if (!value) throw new Error(`Qualifier ${key} requires a value.`);
      if (Object.prototype.hasOwnProperty.call(out, key)) throw new Error(`Duplicate qualifier key: ${key}`);
      out[key] = value;
    }
    return out;
  }

  const validation = useMemo(() => {
    try {
      return validatePurlFields({
        type: pType,
        namespace: pNamespace,
        name: pName,
        version: pVersion,
        qualifiers: collectQualifiers(),
        subpath: pSubpath,
      }, selectedDefinition);
    } catch (err) {
      return { fields:null, errors:[err.message], warnings:[] };
    }
  }, [pType, pNamespace, pName, pVersion, pSubpath, qualifierValues, extraQualifiers, selectedDefinition]);

  const livePreview = useMemo(() => {
    if (!validation.fields || validation.errors.length) return '';
    try { return buildPackageUrl(validation.fields); } catch { return ''; }
  }, [validation]);

  function build() {
    const qualifiers = collectQualifiers();
    const checked = validatePurlFields({
      type: pType,
      namespace: pNamespace,
      name: pName,
      version: pVersion,
      qualifiers,
      subpath: pSubpath,
    }, selectedDefinition);
    if (checked.errors.length) throw new Error(checked.errors.join('\n'));
    const purl = buildPackageUrl(checked.fields);
    setBuilt(purl);
    return { purl, fields:checked.fields, warnings:checked.warnings };
  }

  function applyParsedPurl(value) {
    const parsed = parsePackageUrl(value);
    setPType(parsed.type);
    setPNamespace(parsed.namespace);
    setPName(parsed.name);
    setPVersion(parsed.version);
    setPSubpath(parsed.subpath);
    const def = typeDefinitions[parsed.type];
    const known = new Set((def?.qualifiers_definition || []).map(q => q.key.toLowerCase()));
    const definedValues = {}, extras = [];
    for (const [key, val] of Object.entries(parsed.qualifiers)) {
      if (known.has(key)) definedValues[key] = val;
      else extras.push({ id:genUUID(), key, value:val });
    }
    setQualifierValues(definedValues);
    setExtraQualifiers(extras);
    setParseInput(value);
    setBuilt(value);
  }

  async function importTypeDefinitionFiles(files) {
    const messages = [], next = { ...typeDefinitions };
    for (const file of Array.from(files || [])) {
      try {
        const parsed = JSON.parse(await file.text());
        const candidates = Array.isArray(parsed) ? parsed : Array.isArray(parsed.types) ? parsed.types : [parsed];
        for (const candidate of candidates) {
          const errors = validatePurlTypeDefinition(candidate);
          if (errors.length) {
            messages.push({ level:'error', text:`${file.name}: ${errors.join(' ')}` });
            continue;
          }
          const normalized = normalizePurlTypeDefinition(candidate);
          next[normalized.type] = normalized;
          messages.push({ level:'success', text:`Loaded ${normalized.type_name} (${normalized.type}).` });
        }
      } catch (err) {
        messages.push({ level:'error', text:`${file.name}: ${err.message}` });
      }
    }
    setTypeDefinitions(next);
    persistPurlDefinitions(next);
    setDefinitionMessages(messages);
  }

  function removeImportedDefinition(type) {
    const next = { ...typeDefinitions };
    if (BUILTIN_PURL_TYPE_DEFINITIONS[type]) next[type] = deepClone(BUILTIN_PURL_TYPE_DEFINITIONS[type]);
    else delete next[type];
    setTypeDefinitions(next);
    persistPurlDefinitions(next);
    if (normalizedType === type && !next[type]) setPType('generic');
  }

  function applyQualifierDefaults() {
    const next = { ...qualifierValues };
    for (const q of qualifierDefinitions) if (!String(next[q.key] || '').trim() && q.default_value !== undefined) next[q.key] = String(q.default_value);
    setQualifierValues(next);
  }

  async function createRelatedComponent() {
    try {
      const { purl, fields, warnings } = build();
      const displayName = packageNameDisplay(fields.namespace, fields.name);
      const sw = {
        UUID: genUUID(),
        softwareType: ['software package'],
        name: [
          { nameValue: displayName, nameType: 'product name' },
          { nameValue: purl, nameType: 'package URL (purl)' },
        ],
        version: fields.version || null,
        description: `PURL software component generated for ${softwareLabel(sourceSw)}.`,
        notHashable: true,
        relationshipAssertion: 'Root',
        metadata: [{
          generatedBy: 'SBOM Workbench PURL builder',
          generatedAt: isoNow(),
          purlTypeDefinition: selectedDefinition?.$id || null,
          purlValidationWarnings: warnings.length ? warnings : undefined,
        }],
        supplementaryFiles: null,
      };
      await emit({
        type: OP.SW_ADD_PURL_REL,
        xUUID: sourceSw.UUID,
        software: sw,
        relationship,
      });
      setBuilt(purl);
    } catch (err) {
      alert('Could not create PURL component: ' + err.message);
    }
  }

  if (!sourceSw) return null;
  const namespaceRequirement = componentRequirement(selectedDefinition, 'namespace', 'optional');
  const nameRequirement = componentRequirement(selectedDefinition, 'name', 'required');
  const versionRequirement = componentRequirement(selectedDefinition, 'version', 'optional');
  const subpathRequirement = componentRequirement(selectedDefinition, 'subpath', 'optional');

  return (
    <div className="panel" style={{padding:14, marginBottom:16, borderRadius:3}}>
      <div style={{display:'flex', alignItems:'baseline', gap:10, marginBottom:10, flexWrap:'wrap'}}>
        <div className="serif" style={{fontSize:15, fontWeight:500}}>Create related PURL component</div>
        <span className="badge badge-blue">xUUID source</span>
        <span className="mono dim" style={{fontSize:11}}>{sourceSw.UUID}</span>
        <span className="badge badge-green">type-definition schema 1.0</span>
      </div>
      <div className="muted" style={{fontSize:11, marginBottom:12}}>
        Builds and validates a Package URL, creates a new CyTRICS software entry with <span className="mono">notHashable: true</span>,
        stores the PURL in <span className="mono">name[]</span>, and creates a relationship from the selected file to the new component.
        Imported type definitions are checked against the supplied Package-URL type-definition schema structure and saved in this browser.
      </div>

      <details className="purl-definition-card" style={{marginBottom:10}}>
        <summary style={{cursor:'pointer', fontWeight:600}}>Type-definition registry and PURL parser</summary>
        <div style={{marginTop:10, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div>
            <div className="field-label">Load concrete type-definition JSON</div>
            <input className="input" type="file" accept=".json,application/json" multiple onChange={e=>importTypeDefinitionFiles(e.target.files)} />
            <div className="purl-help">
              A type-definition schema describes the definition format; load concrete package-type definitions here. Load one or more concrete definition files to replace the built-in starter templates.
            </div>
            {definitionMessages.map((m,i) => <div key={i} className={`purl-validation ${m.level === 'error' ? 'error' : 'ok'}`}>{m.text}</div>)}
          </div>
          <div>
            <div className="field-label">Parse an existing PURL into the builder</div>
            <div style={{display:'flex', gap:6}}>
              <input className="input mono" value={parseInput} onChange={e=>setParseInput(e.target.value)} placeholder="pkg:maven/org.example/widget@1.2.3?type=jar" />
              <button className="btn" onClick={() => { try { applyParsedPurl(parseInput); } catch (err) { alert(err.message); } }}>Parse</button>
            </div>
          </div>
        </div>
      </details>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, minmax(0, 1fr))', gap:10}}>
        <Field label="Scheme"><input className="input mono" value="pkg" disabled /></Field>
        <Field label="Type" hint={selectedDefinition ? selectedDefinition.type_name : 'custom / unloaded'}>
          <input className="input mono" list="purl-type-options" value={pType} onChange={e=>setPType(e.target.value)} placeholder="generic, pypi, npm, maven, nuget" />
          <datalist id="purl-type-options">{typeOptions.map(def => <option key={def.type} value={def.type}>{def.type_name}</option>)}</datalist>
        </Field>
        <Field label="Relationship">
          <select className="select mono" value={relationship} onChange={e=>setRelationship(e.target.value)}>
            {SUGGEST.relationship.map(x => <option key={x}>{x}</option>)}
          </select>
        </Field>

        <Field label={<span>Namespace <RequirementBadge requirement={namespaceRequirement}/></span>} hint={componentDefinition(selectedDefinition, 'namespace').native_name || ''}>
          <input className="input mono" value={pNamespace} disabled={namespaceRequirement === 'prohibited'} onChange={e=>setPNamespace(e.target.value)} placeholder={namespaceRequirement === 'prohibited' ? 'prohibited for selected type' : 'organization/scope/group'} />
          <PurlComponentGuidance definition={selectedDefinition} component="namespace" />
        </Field>
        <Field label={<span>Name <RequirementBadge requirement={nameRequirement}/></span>} hint={componentDefinition(selectedDefinition, 'name').native_name || ''}>
          <input className="input mono" value={pName} onChange={e=>setPName(e.target.value)} placeholder="package name" />
          <PurlComponentGuidance definition={selectedDefinition} component="name" />
        </Field>
        <Field label={<span>Version <RequirementBadge requirement={versionRequirement}/></span>} hint={componentDefinition(selectedDefinition, 'version').native_name || ''}>
          <input className="input mono" value={pVersion} onChange={e=>setPVersion(e.target.value)} placeholder="optional package version" />
          <PurlComponentGuidance definition={selectedDefinition} component="version" />
        </Field>
      </div>

      <div className="purl-definition-card" style={{marginTop:2, marginBottom:10}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, marginBottom:8}}>
          <div>
            <div style={{fontWeight:600}}>Qualifiers</div>
            <div className="purl-help">Defined qualifiers are rendered from the selected type definition. Additional qualifiers are allowed but flagged when not declared by that definition.</div>
          </div>
          <div className="purl-toolbar">
            {qualifierDefinitions.some(q=>q.default_value !== undefined) && <button className="btn btn-sm" onClick={applyQualifierDefaults}>Apply defaults</button>}
            <button className="btn btn-sm" onClick={()=>setExtraQualifiers([...extraQualifiers, {id:genUUID(), key:'', value:''}])}><Icon name="plus" size={10}/> Additional qualifier</button>
          </div>
        </div>
        {qualifierDefinitions.length === 0 && extraQualifiers.length === 0 && <div className="dim" style={{fontSize:11}}>No type-specific qualifiers are declared.</div>}
        {qualifierDefinitions.map(q => (
          <div key={q.key} style={{display:'grid', gridTemplateColumns:'minmax(160px,.8fr) minmax(220px,1.2fr)', gap:8, marginBottom:8}}>
            <div>
              <div className="field-label"><span>{q.key} <RequirementBadge requirement={q.requirement || 'optional'}/></span>{q.native_name && <span>{q.native_name}</span>}</div>
              <div className="purl-help">{q.description}{q.default_value !== undefined ? ` Default: ${q.default_value}` : ''}</div>
            </div>
            <input className="input mono" value={qualifierValues[q.key] || ''} onChange={e=>setQualifierValues({...qualifierValues, [q.key]:e.target.value})} placeholder={q.default_value !== undefined ? `default: ${q.default_value}` : 'qualifier value'} />
          </div>
        ))}
        {extraQualifiers.map((row, idx) => (
          <div key={row.id} className="purl-qualifier-row">
            <input className="input mono" value={row.key} onChange={e=>setExtraQualifiers(extraQualifiers.map(x=>x.id===row.id ? {...x,key:e.target.value} : x))} placeholder="qualifier_key" />
            <input className="input mono" value={row.value} onChange={e=>setExtraQualifiers(extraQualifiers.map(x=>x.id===row.id ? {...x,value:e.target.value} : x))} placeholder="value" />
            <button className="btn btn-ghost btn-sm" title="Remove qualifier" onClick={()=>setExtraQualifiers(extraQualifiers.filter(x=>x.id!==row.id))}><Icon name="x" size={11}/></button>
          </div>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
        <Field label={<span>Subpath <RequirementBadge requirement={subpathRequirement}/></span>} hint={componentDefinition(selectedDefinition, 'subpath').native_name || ''}>
          <input className="input mono" value={pSubpath} onChange={e=>setPSubpath(e.target.value)} placeholder="optional/path/inside/package" />
          <PurlComponentGuidance definition={selectedDefinition} component="subpath" />
        </Field>
        <div className="purl-definition-card">
          {selectedDefinition ? <>
            <div className="purl-definition-title">
              <strong>{selectedDefinition.type_name}</strong>
              <span className="badge">{selectedDefinition.type}</span>
              {BUILTIN_PURL_TYPE_DEFINITIONS[selectedDefinition.type] && deepEqual(selectedDefinition, BUILTIN_PURL_TYPE_DEFINITIONS[selectedDefinition.type])
                ? <span className="badge badge-yellow">starter template</span>
                : <span className="badge badge-green">imported definition</span>}
            </div>
            <div className="muted" style={{fontSize:11}}>{selectedDefinition.description}</div>
            {selectedDefinition.repository?.use_repository && <div className="purl-help">Repository: {selectedDefinition.repository.default_repository_url || 'type uses a public repository'}</div>}
            {selectedDefinition.note && <div className="purl-help">{selectedDefinition.note}</div>}
            {(selectedDefinition.namespace_definition?.normalization_rules || selectedDefinition.name_definition?.normalization_rules || selectedDefinition.version_definition?.normalization_rules || selectedDefinition.subpath_definition?.normalization_rules) &&
              <details style={{marginTop:6}}><summary className="purl-help" style={{cursor:'pointer'}}>Normalization rules</summary>
                <ul style={{margin:'4px 0 0 18px', padding:0, fontSize:10, color:'var(--fg-3)'}}>
                  {['namespace','name','version','subpath'].flatMap(component => (componentDefinition(selectedDefinition, component).normalization_rules || []).map((rule,i)=><li key={`${component}-${i}`}><span className="mono">{component}:</span> {rule}</li>))}
                </ul>
              </details>}
            {selectedDefinition.examples?.length > 0 && <div style={{marginTop:7}}>
              <div className="field-label">Examples — click to load</div>
              {selectedDefinition.examples.slice(0,5).map(ex => <button key={ex} className="purl-example" onClick={()=>{ try { applyParsedPurl(ex); } catch(err) { alert(err.message); } }}>{ex}</button>)}
            </div>}
            {!BUILTIN_PURL_TYPE_DEFINITIONS[selectedDefinition.type] || !deepEqual(selectedDefinition, BUILTIN_PURL_TYPE_DEFINITIONS[selectedDefinition.type]) ?
              <button className="btn btn-danger btn-sm" style={{marginTop:8}} onClick={()=>removeImportedDefinition(selectedDefinition.type)}>Remove imported definition</button> : null}
          </> : <>
            <strong>No matching type definition loaded</strong>
            <div className="purl-help">The builder will validate base PURL syntax only. Import a concrete type-definition JSON file for component and qualifier rules.</div>
          </>}
        </div>
      </div>

      {validation.errors.length > 0 && <div className="purl-validation error"><strong>Validation errors</strong><ul style={{margin:'4px 0 0 18px', padding:0}}>{validation.errors.map((x,i)=><li key={i}>{x}</li>)}</ul></div>}
      {validation.warnings.length > 0 && <div className="purl-validation warn"><strong>Warnings</strong><ul style={{margin:'4px 0 0 18px', padding:0}}>{validation.warnings.map((x,i)=><li key={i}>{x}</li>)}</ul></div>}
      {!validation.errors.length && !validation.warnings.length && pName.trim() && <div className="purl-validation ok">PURL components satisfy the currently loaded type definition.</div>}

      <div style={{marginTop:10}}>
        <div className="field-label">Canonical PURL preview</div>
        <div className="panel-inset mono" style={{padding:8, borderRadius:3, wordBreak:'break-all', minHeight:34}}>{livePreview || built || <span className="dim">Complete the required fields to generate a preview.</span>}</div>
      </div>
      <div style={{display:'flex', gap:8, alignItems:'center', marginTop:10, flexWrap:'wrap'}}>
        <button className="btn" onClick={() => { try { build(); } catch (e) { alert(e.message); } }}>
          <Icon name="link" size={11}/> Validate + build PURL
        </button>
        <button className="btn btn-primary" onClick={createRelatedComponent} disabled={validation.errors.length > 0 || !pName.trim()}>
          <Icon name="plus" size={11}/> Create software entry + relationship
        </button>
      </div>
    </div>
  );
}

function SoftwareDetail({ sw, base, emit, state, peerName, showPurlBuilder=false, onTogglePurlBuilder }) {
  // Quick edits emit a setField op against the entry's current anchor.
  const [anchor, setAnchor] = useState(null);
  useEffect(() => {
    computeSoftwareAnchor(sw).then(setAnchor);
  }, [sw]);

  function isModified(field) {
    if (!base) return true; // added entries are entirely "modified"
    return !deepEqual(sw[field], base[field]);
  }

  function setField(field, value) {
    emit({ type: OP.SW_SET_FIELD, anchorEntity: 'software', uuid: sw.UUID, field, value });
  }
  function remove() {
    if (!confirm(`Remove software entry "${softwareLabel(sw)}"?`)) return;
    emit({ type: OP.SW_REMOVE, anchorEntity: 'software', uuid: sw.UUID });
  }

  return (
    <div style={{padding:16, maxWidth:920}}>
      <div style={{display:'flex', alignItems:'baseline', gap:10, marginBottom:14, flexWrap:'wrap'}}>

// ----- relationships -----
function RelationshipsTab({ state, dispatch, emit }) {
  const rels = state.currentSBOM?.relationships || [];
  const swByUUID = useMemo(() => {
    const m = new Map();
    for (const sw of state.currentSBOM?.software || []) m.set(sw.UUID, sw);
    return m;
  }, [state.currentSBOM]);
  const hwByUUID = useMemo(() => {
    const m = new Map();
    for (const hw of state.currentSBOM?.hardware || []) m.set(hw.UUID, hw);
    return m;
  }, [state.currentSBOM]);
  function nameForUUID(uuid) {
    const sw = swByUUID.get(uuid);
    if (sw) return softwareLabel(sw);
    const hw = hwByUUID.get(uuid);
    if (hw) return hw.name?.[0]?.nameValue || hw.identifiers?.[0] || '(hardware)';
    return uuid;
  }
  function entityKind(uuid) {
    return swByUUID.has(uuid) ? 'sw' : (hwByUUID.has(uuid) ? 'hw' : '?');
  }

  const baseRels = useMemo(() =>
    new Set((state.baseSBOM?.relationships || []).map(r =>
      `${r.xUUID}::${r.yUUID}::${r.relationship}`)),
    [state.baseSBOM]);

  const [showAdd, setShowAdd] = useState(false);
  const q = state.searchTerm.toLowerCase().trim();
  const filtered = useMemo(() => rels
    .map((r, i) => ({r, i}))
    .filter(({r}) => {
      if (!q) return true;
      return [r.relationship, nameForUUID(r.xUUID), nameForUUID(r.yUUID),
              r.xUUID, r.yUUID].some(v => String(v).toLowerCase().includes(q));
    }), [rels, q, swByUUID, hwByUUID]);

  function removeRel(idx) {
    const r = rels[idx];
    if (!r) return;
    if (!confirm(`Remove relationship "${nameForUUID(r.xUUID)} ${r.relationship} ${nameForUUID(r.yUUID)}"?`))
      return;
    emit({ type: OP.REL_REMOVE, xUUID: r.xUUID, yUUID: r.yUUID, relationship: r.relationship });
  }

  return (
    <div style={{display:'grid', gridTemplateRows:'auto 1fr', height:'100%', overflow:'hidden'}}>
      <div style={{padding:'8px 12px', borderBottom:'1px solid var(--border)',
                   display:'flex', gap:8, alignItems:'center'}}>
        <div style={{position:'relative', flex:'0 1 360px'}}>
          <div style={{position:'absolute', top:7, left:8, color:'var(--fg-3)'}}>
            <Icon name="search" size={12}/>
          </div>
          <input className="input" style={{paddingLeft:26}} placeholder="Search relationships…"
                 value={state.searchTerm}
                 onChange={e => dispatch({type:'SET_SEARCH', term:e.target.value})} />
        </div>
        <span className="muted mono" style={{fontSize:11}}>
          {filtered.length}/{rels.length}
        </span>
        <div style={{flex:1}}/>
        <button className="btn btn-sm btn-primary" onClick={() => setShowAdd(true)}>
          <Icon name="plus" size={11}/> Add relationship
        </button>
      </div>
      <div style={{overflowY:'auto'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
          <thead>
            <tr style={{position:'sticky', top:0, background:'var(--bg-1)', zIndex:1}}>
              <th style={th()}></th>
              <th style={th()}>Source</th>
              <th style={th({width:140})}>Relationship</th>
              <th style={th()}>Destination</th>
              <th style={th({width:60})}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(({r, i}) => {
              const key = `${r.xUUID}::${r.yUUID}::${r.relationship}`;
              const isAdded = !baseRels.has(key);
              return (
                <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={td({width:18, paddingLeft:12})}>
                    {isAdded && <span className="dot dot-added" title="Added"/>}
                  </td>
                  <td style={td()}>
                    <div>
                      <span className="badge" style={{marginRight:6}}>{entityKind(r.xUUID)}</span>
                      {nameForUUID(r.xUUID)}
                    </div>
                    <div className="mono dim" style={{fontSize:10}}>{shortId(r.xUUID, 8)}</div>
                  </td>
                  <td style={td()}>
                    <span className="badge badge-yellow mono">{r.relationship}</span>
                  </td>
                  <td style={td()}>
                    <div>
                      <span className="badge" style={{marginRight:6}}>{entityKind(r.yUUID)}</span>
                      {nameForUUID(r.yUUID)}
                    </div>
                    <div className="mono dim" style={{fontSize:10}}>{shortId(r.yUUID, 8)}</div>
                  </td>
                  <td style={td()}>
                    <button className="btn btn-sm btn-ghost" onClick={() => removeRel(i)}>
                      <Icon name="trash" size={11}/>
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {showAdd && <AddRelationshipModal state={state} onClose={()=>setShowAdd(false)} emit={emit}/>}
    </div>
  );
  function th(extra){return {textAlign:'left', padding:'8px 10px', fontSize:10,
    textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--fg-3)',
    borderBottom:'1px solid var(--border)', fontWeight:600, ...extra};}
  function td(extra){return {padding:'8px 10px', verticalAlign:'top', ...extra};}
}

function AddRelationshipModal({ state, onClose, emit }) {
  const [src, setSrc] = useState('');
  const [dst, setDst] = useState('');
  const [rel, setRel] = useState('Contains');
  const all = useMemo(() => {
    const list = [];
    for (const sw of state.currentSBOM?.software || [])
      list.push({ uuid: sw.UUID, kind: 'sw', label: softwareLabel(sw) });
    for (const hw of state.currentSBOM?.hardware || [])
      list.push({ uuid: hw.UUID, kind: 'hw', label: hw.name?.[0]?.nameValue || hw.identifiers?.[0] || hw.UUID });
    return list;
  }, [state.currentSBOM]);

  const [srcQ, setSrcQ] = useState('');
  const [dstQ, setDstQ] = useState('');
  const srcMatches = all.filter(x => x.label.toLowerCase().includes(srcQ.toLowerCase())
                                  || x.uuid.includes(srcQ)).slice(0, 12);
  const dstMatches = all.filter(x => x.label.toLowerCase().includes(dstQ.toLowerCase())
                                  || x.uuid.includes(dstQ)).slice(0, 12);

  function commit() {
    if (!src || !dst) return;
    emit({ type: OP.REL_ADD, xUUID: src, yUUID: dst, relationship: rel || 'Contains' });
    onClose();
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{width:680}} onClick={e => e.stopPropagation()}>
        <div style={{padding:'12px 16px', borderBottom:'1px solid var(--border)',
                     display:'flex', alignItems:'center'}}>
          <span className="serif" style={{fontSize:15, fontWeight:500}}>Add relationship</span>
          <div style={{flex:1}}/>
          <button className="btn btn-sm btn-ghost" onClick={onClose}><Icon name="x" size={11}/></button>
        </div>
        <div style={{padding:16, display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:14}}>
          <div>
            <Field label="Source entity">
              <input className="input" placeholder="search by name or UUID"
                     value={srcQ} onChange={e => setSrcQ(e.target.value)} />
              <div className="panel-inset" style={{marginTop:6, maxHeight:200, overflowY:'auto', padding:4}}>
                {srcMatches.map(m => (
                  <div key={m.uuid} className="list-row"
                       style={{padding:'4px 6px', borderBottom:'none',
                               background: src===m.uuid ? 'var(--sel-bg)' : 'transparent'}}
                       onClick={() => setSrc(m.uuid)}>
                    <span className="badge">{m.kind}</span>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:11, overflow:'hidden', textOverflow:'ellipsis'}}>{m.label}</div>
                      <div className="mono dim" style={{fontSize:10}}>{shortId(m.uuid,8)}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Field>
          </div>
          <div style={{alignSelf:'center', textAlign:'center'}}>
            <Field label="Relationship">
              <SuggestInput mono value={rel} suggestions={SUGGEST.relationship}
                     onChange={setRel} />
              <div className="dim" style={{fontSize:10, marginTop:4}}>
                e.g. Contains, Uses, Downloads
              </div>
            </Field>
          </div>
          <div>
            <Field label="Destination entity">
              <input className="input" placeholder="search by name or UUID"
                     value={dstQ} onChange={e => setDstQ(e.target.value)} />
              <div className="panel-inset" style={{marginTop:6, maxHeight:200, overflowY:'auto', padding:4}}>
                {dstMatches.map(m => (
                  <div key={m.uuid} className="list-row"
                       style={{padding:'4px 6px', borderBottom:'none',
                               background: dst===m.uuid ? 'var(--sel-bg)' : 'transparent'}}
                       onClick={() => setDst(m.uuid)}>
                    <span className="badge">{m.kind}</span>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:11, overflow:'hidden', textOverflow:'ellipsis'}}>{m.label}</div>
                      <div className="mono dim" style={{fontSize:10}}>{shortId(m.uuid,8)}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Field>
          </div>
        </div>
        <div style={{padding:12, borderTop:'1px solid var(--border)',
                     display:'flex', justifyContent:'flex-end', gap:8}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={commit} disabled={!src || !dst || !rel}>
            <Icon name="plus" size={11}/> Add
          </button>
        </div>
      </div>
    </div>
  );
}

// ----- hardware tab (lightweight editor) -----
function HardwareTab({ state, dispatch, emit, peerName }) {
  const list = state.currentSBOM?.hardware || [];
  const baseByUUID = useMemo(() => {
    const m = new Map();
    for (const hw of state.baseSBOM?.hardware || []) m.set(hw.UUID, hw);
    return m;
  }, [state.baseSBOM]);

  const q = state.searchTerm.toLowerCase().trim();
  const filtered = list.filter(hw => {
    if (!q) return true;
    return JSON.stringify(hw).toLowerCase().includes(q);
  });
  const selected = list.find(h => h.UUID === state.selectedHardwareUUID);

  function addHardware() {
    const hw = {
      UUID: genUUID(),
      name: [{ nameType: 'product name', nameValue: 'New hardware entry' }],
      identifiers: [],
      hardwareType: [],
      captureTime: isoNow(),
      vendor: [],
      description: '',
      quantity: 1,
      countryOfOrigin: null,
      countryOfOriginSource: null,
      comments: [],
      metadata: [],
    };
    emit({ type: OP.HW_ADD, hardware: hw })
      .then(() => dispatch({type:'SELECT_HARDWARE', uuid: hw.UUID}));
  }

  function setField(uuid, field, value) {
    emit({ type: OP.HW_SET_FIELD, uuid, field, value });
  }

  return (
    <div style={{display:'grid', gridTemplateColumns:'380px 1fr', height:'100%', overflow:'hidden'}}>
      <div className="divider-r" style={{display:'flex', flexDirection:'column'}}>
        <div style={{padding:'8px 10px', borderBottom:'1px solid var(--border)', display:'flex', gap:6}}>
          <div style={{position:'relative', flex:1}}>
            <div style={{position:'absolute', top:7, left:8, color:'var(--fg-3)'}}>
              <Icon name="search" size={12}/>
            </div>
            <input className="input" style={{paddingLeft:26}} placeholder="Search hardware…"
                   value={state.searchTerm}
                   onChange={e => dispatch({type:'SET_SEARCH', term:e.target.value})} />
          </div>
          <button className="btn btn-sm btn-primary" onClick={addHardware}>
            <Icon name="plus" size={11}/>
          </button>
        </div>
        <div style={{flex:1, overflowY:'auto'}}>
          {filtered.map(hw => {
            const base = baseByUUID.get(hw.UUID);
            const isAdded = !base;
            const isModified = base && !deepEqual(hw, base);
            const label = hw.name?.[0]?.nameValue || hw.identifiers?.[0] || '(unnamed hw)';
            return (
              <div key={hw.UUID}
                   className={"list-row " + (state.selectedHardwareUUID===hw.UUID ? 'selected' : '')}
                   style={{position:'relative'}}
                   onClick={() => dispatch({type:'SELECT_HARDWARE', uuid: hw.UUID})}>
                <div style={{paddingTop:3}}>
                  {isAdded ? <span className="dot dot-added"/>
                   : isModified ? <span className="dot dot-modified"/>
                   : <span className="dot" style={{background:'var(--border-2)'}}/>}
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:500, fontSize:12, overflow:'hidden',
                               textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{label}</div>
                  <div className="muted" style={{fontSize:11}}>
                    {(hw.hardwareType||[]).join(', ')}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{overflowY:'auto'}}>
        {selected
         ? <HardwareDetail key={selected.UUID} hw={selected}
                           base={baseByUUID.get(selected.UUID)}
                           setField={(f,v) => setField(selected.UUID, f, v)}
                           remove={() => {
                             if (confirm('Remove hardware entry?'))
                               emit({type: OP.HW_REMOVE, uuid: selected.UUID});
                           }}
                           peerName={peerName}/>
         : <div style={{padding:40, color:'var(--fg-3)', textAlign:'center'}}>
             Select a hardware entry or click + to add one.
           </div>}
      </div>
    </div>
  );
}

        <Field label="Country of origin" modified={isModified('countryOfOrigin')}>

        </Field>
        <div style={{gridColumn:'1 / -1'}}>
          <Field label="Comments" modified={isModified('comments')}>
            <CommentEditor value={hw.comments} onChange={v => setField('comments', v)}
                           peerName={peerName} fieldSuggestions={SUGGEST.hwFields}/>
          </Field>
        </div>
        <div style={{gridColumn:'1 / -1'}}>
          <Field label="Metadata (raw JSON)" modified={isModified('metadata')}>

// ----- metadata (BOM-level) tab -----
function MetadataTab({ state, emit, peerName }) {
  const s = state.currentSBOM || {};
  const base = state.baseSBOM || {};
  function mod(f) { return !deepEqual(s[f], base[f]); }
  function setF(f, v) { emit({ type: OP.BOM_SET_FIELD, field: f, value: v }); }

  return (
    <div style={{padding:20, maxWidth:760, overflowY:'auto'}}>
      <div className="serif" style={{fontSize:18, fontWeight:500, marginBottom:14}}>BOM metadata</div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
        <Field label="BOM UUID" modified={mod('bomUUID')}>
          <input className="input mono" value={s.bomUUID||''}
                 onChange={e => setF('bomUUID', e.target.value)}/>
        </Field>
        <Field label="Spec version" modified={mod('specVersion')}>
          <input className="input mono" value={s.specVersion||''}
                 onChange={e => setF('specVersion', e.target.value)}/>
        </Field>
        <Field label="BOM format" modified={mod('bomFormat')}>
          <input className="input mono" value={s.bomFormat||''}
                 onChange={e => setF('bomFormat', e.target.value)}/>
        </Field>
        <div/>

// ----- history (op log) tab -----
function HistoryTab({ state }) {
  function describeOp(op) {
    switch (op.type) {
      case OP.SW_SET_FIELD: return `set software.${op.field}`;
      case OP.HW_SET_FIELD: return `set hardware.${op.field}`;
      case OP.SW_ADD: return `add software`;
      case OP.SW_ADD_PURL_REL: return `add PURL software + relationship`;
      case OP.HW_ADD: return `add hardware`;
      case OP.SW_REMOVE: return `remove software`;
      case OP.HW_REMOVE: return `remove hardware`;
      case OP.REL_ADD: return `add relationship "${op.relationship}"`;
      case OP.REL_REMOVE: return `remove relationship "${op.relationship}"`;
      case OP.REL_SET_COMMENTS: return `set rel comments`;
      case OP.BOM_SET_FIELD: return `set bom.${op.field}`;
      default: return op.type;
    }
  }
  return (
    <div style={{height:'100%', overflowY:'auto'}}>
      <div style={{padding:'10px 14px', borderBottom:'1px solid var(--border)'}}>
        <div className="muted" style={{fontSize:11}}>
          Every manual change is an operation referencing entries by stable anchor.
          The modifications export is exactly this stream.
        </div>
      </div>
      {state.ops.length === 0 && (
        <div style={{padding:30, textAlign:'center', color:'var(--fg-3)'}}>
          No operations yet. Start editing to see them appear here.
        </div>
      )}
      {state.ops.map(op => (
        <div key={op.id} className="op-row">
          <span className="dim">[{op.ts}]</span>
          <span className="dim">{op.peerId}</span>
          <span className="op-type">{describeOp(op)}</span>
          <span style={{flex:1, color:'var(--fg-2)', overflow:'hidden', textOverflow:'ellipsis'}}>
            {opTarget(op)}
          </span>
          <span className="dim">{new Date(op.wallTime).toLocaleTimeString()}</span>
        </div>
      ))}
    </div>
  );
  function opTarget(op) {
    if (op.anchor) return `${op.anchor.type}:${shortId(op.anchor.value, 12)}`;
    if (op.srcAnchor && op.dstAnchor)
      return `${shortId(op.srcAnchor.value, 8)} → ${shortId(op.dstAnchor.value, 8)}`;
    if (op.type === OP.SW_ADD_PURL_REL && op.srcAnchor && op.anchor)
      return `${shortId(op.srcAnchor.value, 8)} → PURL:${shortId(op.anchor.value, 8)}`;
    if (op.field) return op.field;
    return '';
  }
}

    const id = 'cytrics-' + genUUID().slice(0, 12);
    setRoomId(id);
  }

    if (!roomId || !password) { setError('room id and password required'); return; }
    setBusy(true); setError(null);
    try {
      const pn = new PeerNet({ roomId, password, peerName,
        onEvent: ev => handlePeerEvent(ev, dispatch, peerNet, sendStateRef, applyRemoteOp, state) });
      await pn.start({ asHost: true });
      setPeerNet(pn);
      dispatch({ type:'SET_PEER_NAME', name: peerName });
      dispatch({ type:'TOAST', msg:`Hosting room ${roomId}` });
      onClose();
    } catch (e) {

// Bridge between PeerNet events and React state.
function handlePeerEvent(ev, dispatch, peerNet, sendStateRef, applyRemoteOp, getState) {
  switch (ev.type) {
    case 'log':
      dispatch({type:'LOG', level: ev.level, msg: ev.msg});
      break;
    case 'peers':
      dispatch({type:'PEERS', list: ev.list});
      break;
    case 'sendStateTo':
      // host (or any peer that has state) responds
      if (sendStateRef.current) sendStateRef.current(ev.conn);
      break;
    case 'gotState':
      // Replace local state with host's
      (async () => {
        const hash = await sha256Hex(JSON.stringify(ev.baseSBOM));
        const replayed = await replayOps(ev.baseSBOM, ev.ops);
        dispatch({type:'INGEST_STATE',
                  baseSBOM: ev.baseSBOM,
                  hash, ops: ev.ops,
                  currentSBOM: replayed.sbom});
        dispatch({type:'TOAST', msg:`Synced state from ${ev.fromPeer}`,
                  level:'success'});
      })();
      break;
    case 'remoteOp':
      applyRemoteOp(ev.op);
      break;
  }
}

function PatchApplyPreview({ patch, state, onApply, onCancel }) {
  const [report, setReport] = useState(null);
  const [working, setWorking] = useState(true);

  useEffect(() => {
    (async () => {
      setWorking(true);
      const r = await replayOps(state.currentSBOM, patch.operations || []);
      setReport(r.report);
      setWorking(false);
    })();
  }, [patch, state.currentSBOM]);

  const counts = useMemo(() => {
    if (!report) return null;
    const c = { applied:0, skipped:0, unresolved:0 };
    for (const x of report) c[x.status] = (c[x.status]||0) + 1;
    return c;
  }, [report]);

  return (
    <div>
      <div style={{display:'flex', gap:10, marginBottom:14, alignItems:'baseline'}}>
        <div className="serif" style={{fontSize:14, fontWeight:500}}>Modifications preview</div>
        <div className="muted" style={{fontSize:11}}>
          base bom: <span className="mono">{shortId(patch.baseBom?.bomUUID, 12)}</span> ·
          digest: <span className="mono">{shortId(patch.baseBom?.originalDigest, 12)}</span> ·
          ops: <strong>{(patch.operations||[]).length}</strong>
        </div>
      </div>
      {working
       ? <div className="muted">Resolving anchors…</div>
       : <>
          <div style={{display:'flex', gap:10, marginBottom:14}}>
            <span className="badge badge-green">applied {counts.applied||0}</span>
            <span className="badge badge-yellow">skipped {counts.skipped||0}</span>
            <span className="badge badge-red">unresolved {counts.unresolved||0}</span>
          </div>
          <div className="panel-inset" style={{maxHeight:280, overflowY:'auto', padding:6, borderRadius:3}}>
            {report.map(r => {
              const op = (patch.operations||[]).find(o => o.id === r.opId) || {};
              return (
                <div key={r.opId} className="op-row" style={{borderBottom:'1px solid var(--border)'}}>
                  <span className={r.status==='applied' ? 'badge badge-green'
                                  : r.status==='skipped' ? 'badge badge-yellow'
                                  : 'badge badge-red'}>{r.status}</span>
                  <span className="op-type">{op.type}</span>
                  <span style={{flex:1, color:'var(--fg-2)'}}>
                    {op.field || ''} {r.message ? `(${r.message})` : ''}
                  </span>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:14, display:'flex', justifyContent:'flex-end', gap:8}}>
            <button className="btn" onClick={onCancel}>Cancel</button>
            <button className="btn btn-primary" onClick={onApply}>
              Apply {counts.applied} ops
            </button>
          </div>
        </>}
    </div>
  );
}

/* ========================================================================= *
 *  PATCH FORMAT                                                             *
 * ========================================================================= */

function buildPatch(state) {
  return {
    $schema: 'cytrics-sbom-mods-v1',
    baseBom: {
      bomUUID: state.baseSBOM?.bomUUID || null,
      originalDigest: state.baseSBOMHash,
      exportedAt: isoNow(),
    },
    anchors: {
      system: 'Software anchors use sha256 → sha1 → md5 → composite tiers. ' +
              'Composite hashes a stable fingerprint over: names, fileNames, ' +
              'size, softwareType, vendors, and a digest of the metadata array. ' +
              'UUID, captureTime, containerPath, installPath, and version are ' +
              'deliberately excluded. Hardware uses a composite over ' +
              '(identifiers, names, hardwareType, vendor, packageType). ' +
              'Relationships are anchored by the (srcAnchor, dstAnchor, relationship) triple.',
    },
    operations: state.ops.map(o => ({...o})),
  };
}

 *  8. APP                                                                   *
 * ========================================================================= */

function App() {
  const [state, dispatch] = useReducer(reducer, undefined, initialState);
  const [peerNet, setPeerNet] = useState(null);
  const [showCollab, setShowCollab] = useState(false);
  const [showPatch, setShowPatch] = useState(false);
  const stateRef = useRef(state);
  stateRef.current = state;

  // ----- Theme -----
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('sbomwb:theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('sbomwb:theme', theme); } catch {}
  }, [theme]);
  const toggleTheme = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);

  // ----- Browser cache (localStorage) -----
  const [autoCache, setAutoCache] = useState(() => {
    try { return (localStorage.getItem('sbomwb:autocache') ?? '1') === '1'; } catch { return true; }
  });
  useEffect(() => {
    try { localStorage.setItem('sbomwb:autocache', autoCache ? '1' : '0'); } catch {}
  }, [autoCache]);
  const cacheErrRef = useRef(false);
  useEffect(() => {
    if (!state.started || !autoCache) return;
    const h = setTimeout(() => {
      saveCacheEntry(stateRef.current).then(r => {
        if (!r.ok && !cacheErrRef.current) {
          cacheErrRef.current = true; // toast once, not on every keystroke
          dispatch({ type:'TOAST', level:'error',
                     msg: 'IndexedDB cache save failed: ' + r.err });
        }
      });
    }, 1200);
    return () => clearTimeout(h);
  }, [state.started, state.ops, state.baseSBOMHash, autoCache]);

  // Tracks the most recent locally-emitted op so sequential edits to the
  // same field coalesce into one history entry (e.g. typing "abc" is one op,
  // not three). Coalescing only happens while our op is still the newest in
  // the log; any interleaved op (local or remote) starts a fresh entry.
  const lastEmitRef = useRef(null);

  // emit: create an op (filling in anchor from current state), apply locally, broadcast.
  const emit = useCallback(async (partial) => {
    const cur = stateRef.current;
    const nextLamport = cur.lamport + 1;

    // ---- Coalescing path ----
    const COALESCIBLE = [OP.SW_SET_FIELD, OP.HW_SET_FIELD, OP.BOM_SET_FIELD];
    const last = cur.ops[cur.ops.length - 1];
    const lt = lastEmitRef.current;
    if (COALESCIBLE.includes(partial.type) && last && lt &&
        last.id === lt.opId && last.peerId === cur.peerId &&
        lt.type === partial.type && lt.field === partial.field &&
        (partial.type === OP.BOM_SET_FIELD || lt.uuid === partial.uuid)) {
      // Update the existing op in place: same id/ts/anchor, bumped rev.
      // Keeping the ORIGINAL anchor is essential — it was computed against the
      // pre-edit state and is what replay resolves at this op's position.
      const updated = { ...last, value: deepClone(partial.value),
                        rev: (last.rev || 0) + 1, wallTime: isoNow() };
      const allOps = [...cur.ops.slice(0, -1), updated];
      const { sbom: newCurrent } = await replayOps(cur.baseSBOM, allOps);
      dispatch({ type:'APPEND_OPS_REBUILD', allOps, newCurrent });
      if (peerNet) peerNet.broadcastOp(updated);
      return;
    }

    // Resolve UUID -> anchor based on current SBOM, for anchor-carrying ops.
    let payload = { ...partial };
    if ([OP.SW_SET_FIELD, OP.SW_REMOVE].includes(partial.type)) {
      const sw = (cur.currentSBOM?.software || []).find(x => x.UUID === partial.uuid);
      if (!sw) { dispatch({type:'TOAST', level:'error', msg:'entry not found'}); return; }
      payload.anchor = await computeSoftwareAnchor(sw);
      delete payload.uuid;
    } else if ([OP.HW_SET_FIELD, OP.HW_REMOVE].includes(partial.type)) {
      const hw = (cur.currentSBOM?.hardware || []).find(x => x.UUID === partial.uuid);
      if (!hw) { dispatch({type:'TOAST', level:'error', msg:'entry not found'}); return; }
      payload.anchor = await computeHardwareAnchor(hw);
      delete payload.uuid;
    } else if (partial.type === OP.SW_ADD) {
      payload.anchor = await computeSoftwareAnchor(partial.software);
    } else if (partial.type === OP.SW_ADD_PURL_REL) {
      const srcSw = (cur.currentSBOM?.software || []).find(s => s.UUID === partial.xUUID);
      const srcHw = (cur.currentSBOM?.hardware || []).find(h => h.UUID === partial.xUUID);
      if (!srcSw && !srcHw) { dispatch({type:'TOAST', level:'error', msg:'source entry not found'}); return; }
      payload.srcAnchor = srcSw ? await computeSoftwareAnchor(srcSw) : await computeHardwareAnchor(srcHw);
      payload.anchor = await computeSoftwareAnchor(partial.software);
      delete payload.xUUID;
    } else if (partial.type === OP.HW_ADD) {
      payload.anchor = await computeHardwareAnchor(partial.hardware);
    } else if ([OP.REL_ADD, OP.REL_REMOVE, OP.REL_SET_COMMENTS].includes(partial.type)) {
      // Resolve src/dst UUIDs -> anchors using whichever side (sw or hw) they belong to.
      const srcSw = (cur.currentSBOM?.software || []).find(s => s.UUID === partial.xUUID);
      const srcHw = (cur.currentSBOM?.hardware || []).find(h => h.UUID === partial.xUUID);
      const dstSw = (cur.currentSBOM?.software || []).find(s => s.UUID === partial.yUUID);
      const dstHw = (cur.currentSBOM?.hardware || []).find(h => h.UUID === partial.yUUID);
      payload.srcAnchor = srcSw ? await computeSoftwareAnchor(srcSw)
                          : srcHw ? await computeHardwareAnchor(srcHw) : null;
      payload.dstAnchor = dstSw ? await computeSoftwareAnchor(dstSw)
                          : dstHw ? await computeHardwareAnchor(dstHw) : null;
      delete payload.xUUID; delete payload.yUUID;
    }

    const op = makeOp({
      type: partial.type,
      peerId: cur.peerId,
      lamport: nextLamport,
      payload,
    });

    // Append locally and recompute current SBOM.
    const allOps = mergeOps(cur.ops, [op]);
    const { sbom: newCurrent } = await replayOps(cur.baseSBOM, allOps);
    dispatch({ type:'APPEND_OPS_REBUILD', allOps, newCurrent });
    lastEmitRef.current = COALESCIBLE.includes(partial.type)
      ? { opId: op.id, type: partial.type, field: partial.field, uuid: partial.uuid }
      : null;
    // Broadcast
    if (peerNet) peerNet.broadcastOp(op);
  }, [peerNet]);

  // Receive op from remote peer
  const applyRemoteOp = useCallback(async (op) => {
    const cur = stateRef.current;
    const allOps = mergeOps(cur.ops, [op]);
    const { sbom: newCurrent } = await replayOps(cur.baseSBOM, allOps);
    dispatch({ type:'APPEND_OPS_REBUILD', allOps, newCurrent });
  }, []);

  // Apply a loaded patch on top of currently loaded SBOM.
  const applyPatch = useCallback(async (patch) => {
    const cur = stateRef.current;
    const incoming = patch.operations || [];
    const allOps = mergeOps(cur.ops, incoming);
    const { sbom: newCurrent, report } = await replayOps(cur.baseSBOM, allOps);
    dispatch({ type:'PATCH_APPLIED', baseSBOM: cur.baseSBOM,
               hash: cur.baseSBOMHash, currentSBOM: newCurrent, ops: allOps });
    const unresolved = report.filter(r => r.status === 'unresolved').length;
    dispatch({ type:'TOAST',
               level: unresolved ? 'error' : 'success',
               msg: `Applied ${report.length - unresolved}/${report.length} ops` +
                    (unresolved ? `, ${unresolved} could not be resolved` : '') });
  }, []);

  // PeerNet needs a way to send our state to incoming peers.
  const sendStateRef = useRef(null);
  sendStateRef.current = (conn) => {
    if (!peerNet) return;
    const cur = stateRef.current;
    peerNet.sendStateTo(conn, cur.baseSBOM, cur.ops);
  };

  // Toast dismiss
  useEffect(() => {
    if (!state.toasts.length) return;
    const t = state.toasts[state.toasts.length-1];
    const h = setTimeout(() => dispatch({type:'TOAST_DISMISS', id: t.id}), 4500);
    return () => clearTimeout(h);
  }, [state.toasts]);

  if (!state.started) return <Splash dispatch={dispatch} theme={theme} toggleTheme={toggleTheme} />;

  function onExportSBOM() {
    downloadJSON((state.fileName||'sbom'), state.currentSBOM);
    dispatch({type:'TOAST', msg:'SBOM exported', level:'success'});
  }
  function onExportPatch() {
    const patch = buildPatch(state);
    downloadJSON((state.fileName||'sbom').replace(/\.json$/,'') + '.mods.json', patch);
    dispatch({type:'TOAST', msg:`Modifications exported (${state.ops.length} ops)`, level:'success'});
  }

  return (
    <div style={{display:'grid', gridTemplateRows:'auto auto 1fr', height:'100%'}}>
      <Header state={state} dispatch={dispatch} peerNet={peerNet}
              onExportSBOM={onExportSBOM} onExportPatch={onExportPatch}
              onOpenPatch={()=>setShowPatch(true)}
              onOpenCollab={()=>setShowCollab(true)}
              theme={theme} toggleTheme={toggleTheme}
              autoCache={autoCache} setAutoCache={setAutoCache} />
      <TabBar state={state} dispatch={dispatch}/>
      <div style={{overflow:'hidden'}}>
        {state.tab === 'software' &&
          <SoftwareTab state={state} dispatch={dispatch} emit={emit} peerName={state.peerName}/>}
        {state.tab === 'hardware' &&
          <HardwareTab state={state} dispatch={dispatch} emit={emit} peerName={state.peerName}/>}
        {state.tab === 'relationships' &&
          <RelationshipsTab state={state} dispatch={dispatch} emit={emit}/>}
        {state.tab === 'metadata' &&
          <MetadataTab state={state} emit={emit} peerName={state.peerName}/>}
        {state.tab === 'history' &&
          <HistoryTab state={state}/>}
      </div>

      {showCollab && (
        <CollabModal state={state} dispatch={dispatch}
                     peerNet={peerNet} setPeerNet={setPeerNet}
                     emit={emit} applyRemoteOp={applyRemoteOp}
                     sendStateRef={sendStateRef}
                     onClose={()=>setShowCollab(false)}/>
      )}
      {showPatch && (
        <PatchModal state={state} dispatch={dispatch}
                    onClose={()=>setShowPatch(false)}
                    applyPatch={applyPatch}/>
      )}

      <div className="toast-stack">
        {state.toasts.map(t => (
          <div key={t.id} className={"toast " + (t.level==='error'?'error':t.level==='success'?'success':'')}>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

function mergeOps(a, b) {
  // Upsert semantics: an op with a known id but a higher rev REPLACES the
  // existing one in place (sequential same-field edits coalesce into one op).
  const byId = new Map();
  const merged = [];
  for (const op of a) { byId.set(op.id, merged.length); merged.push(op); }
  for (const op of b) {
    const i = byId.get(op.id);
    if (i === undefined) { byId.set(op.id, merged.length); merged.push(op); }
    else if ((op.rev || 0) > (merged[i].rev || 0)) merged[i] = op;
  }
  merged.sort((x, y) => {
    if (x.ts !== y.ts) return x.ts - y.ts;
    if (x.peerId !== y.peerId) return x.peerId < y.peerId ? -1 : 1;
    return x.id < y.id ? -1 : 1;
  });
  return merged;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
